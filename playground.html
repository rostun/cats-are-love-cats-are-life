<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Kitty Cursor Test</title>
		<style>
			body {
				height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: sans-serif;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Kitty Playground</h1>
			<div id="cat">🐈</div>
		</main>

		<script type="module">
			import { enableKittyCursor } from './dist/cursor/kitty.js';

			enableKittyCursor({
				animation: 'parabola',
			});
		</script>

		<script type="module">
			import { kittyBurst } from './dist/interact/kittyBurst.js';

			const cat = document.getElementById('cat');

			if (cat) {
				kittyBurst(cat, {
					holdMs: 500,
					burstCount: 10,
					emoji: '🐈',
					fragmentEmoji: '🐱',
					size: '5rem',
					fragmentSize: '1.5rem',
					durationMs: 900,
					respawn: false,
				});
			}
		</script>
	</body>
</html>
